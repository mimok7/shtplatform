<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>오프라인 안내</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
        color: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 420px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
        padding: 28px 24px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        font-size: 14px;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>인터넷 연결을 확인해 주세요</h1>
      <p>연결이 복구되면 고객 예약 앱을 다시 열어 최신 정보를 불러올 수 있습니다.</p>
    </main>
  </body>
</html>
